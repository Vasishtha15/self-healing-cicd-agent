name: CI Pipeline with Self-Healing Agent

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      job_status: ${{ job.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        id: install
        run: |
          pip install -r sample-app/requirements.txt
        continue-on-error: true

      - name: Run lint check
        id: lint
        run: |
          pip install flake8
          flake8 sample-app/ --max-line-length=120 --output-file=lint-output.txt || true
          cat lint-output.txt
        continue-on-error: true

      - name: Run tests
        id: test
        run: |
          pip install pytest
          cd sample-app && pytest tests/ -v 2>&1 | tee ../test-output.txt
        continue-on-error: true

      - name: Build Docker image
        id: docker
        run: |
          docker build -t sample-app:${{ github.sha }} ./sample-app 2>&1 | tee docker-output.txt
        continue-on-error: true

      - name: Upload logs as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: |
            lint-output.txt
            test-output.txt
            docker-output.txt

      - name: Collect failure context
        if: always()
        id: collect-context
        run: |
          INSTALL_STATUS="${{ steps.install.outcome }}"
          LINT_STATUS="${{ steps.lint.outcome }}"
          TEST_STATUS="${{ steps.test.outcome }}"
          DOCKER_STATUS="${{ steps.docker.outcome }}"

          echo "install_status=$INSTALL_STATUS" >> $GITHUB_OUTPUT
          echo "lint_status=$LINT_STATUS" >> $GITHUB_OUTPUT
          echo "test_status=$TEST_STATUS" >> $GITHUB_OUTPUT
          echo "docker_status=$DOCKER_STATUS" >> $GITHUB_OUTPUT

          # Combine all logs for the agent
          echo "=== INSTALL LOGS ===" > combined-logs.txt
          cat lint-output.txt >> combined-logs.txt 2>/dev/null || echo "No install logs" >> combined-logs.txt
          echo "=== LINT LOGS ===" >> combined-logs.txt
          cat lint-output.txt >> combined-logs.txt 2>/dev/null || echo "No lint logs" >> combined-logs.txt
          echo "=== TEST LOGS ===" >> combined-logs.txt
          cat test-output.txt >> combined-logs.txt 2>/dev/null || echo "No test logs" >> combined-logs.txt
          echo "=== DOCKER LOGS ===" >> combined-logs.txt
          cat docker-output.txt >> combined-logs.txt 2>/dev/null || echo "No docker logs" >> combined-logs.txt

      - name: Upload combined logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: combined-logs
          path: combined-logs.txt

  self-healing-agent:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent dependencies
        run: |
          pip install anthropic requests PyGithub

      - name: Download pipeline logs
        uses: actions/download-artifact@v4
        with:
          name: combined-logs
        continue-on-error: true

      - name: Run Self-Healing Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          INSTALL_STATUS: ${{ needs.build-and-test.outputs.job_status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python agent/self_healing_agent.py
